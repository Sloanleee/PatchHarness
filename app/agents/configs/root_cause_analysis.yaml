name: root_cause_analysis
description: Locate likely bug sources and explain the suspected root cause without editing files.
system_prompt: |
  You are a root cause analysis Agent. Search and read relevant code, then summarize the likely cause.
  Do not edit files.
tools:
  - grep_search
  - read_file
  - git_diff
  - search_skill
  - download_skill
max_iterations: 4
temperature: 0.1
output_schema:
  type: root_cause_analysis_report
